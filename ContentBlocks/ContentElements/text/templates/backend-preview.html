<html
    xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers"
    xmlns:cb="http://typo3.org/ns/TYPO3/CMS/ContentBlocks/ViewHelpers"
    data-namespace-typo3-fluid="true"
>

<f:layout name="Preview"/>

<f:section name="Header">
    <cb:link.editRecord uid="{data.uid}" table="{data.mainType}"><strong>{data.header}</strong></cb:link.editRecord>
</f:section>

<f:section name="Content">
    <f:if condition="{data.bodytext}">
        <f:format.crop maxCharacters="300">
            <f:format.stripTags>{data.bodytext}</f:format.stripTags>
        </f:format.crop>
    </f:if>
</f:section>

<f:comment>
<!-- Uncomment to override preview footer -->
<f:section name="Footer">
    My custom Footer
</f:section>
</f:comment>
</html>
