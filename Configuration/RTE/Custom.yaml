imports:
    - { resource: "EXT:rte_ckeditor/Configuration/RTE/Processing.yaml" }
    - { resource: "EXT:rte_ckeditor/Configuration/RTE/Editor/Base.yaml" }
    - { resource: "EXT:rte_ckeditor/Configuration/RTE/Editor/Plugins.yaml" }

editor:
    config:
        contentsCss: "EXT:stepping_stone_site_package/Resources/Public/Css/rte.css"

        toolbar:
            items:
                - heading
                - style
                - '|'
                - bold
                - italic
                - '|'
                - bulletedList
                - numberedList
                - indent
                - outdent
                - blockQuote
                - alignment
                - '-'
                - link
                - '|'
                - undo
                - redo
                - removeFormat
                - '|'
                - insertTable
                - specialCharacters
                - '|'
                - codeBlock
                - '|'
                - sourceEditing

        style:
            definitions:
                - { name: 'Subline', element: 'p', classes: ['ndz-rte-subline'] }
                - { name: 'Lead', element: 'p', classes: ['ndz-rte-lead'] }

        heading:
            options:
                - { model: 'paragraph', title: 'Paragraph', class: 'ck-heading_paragraph' }
                - { model: 'heading2', view: 'h2', title: 'Heading 2', class: 'ck-heading_heading2' }
                - { model: 'heading3', view: 'h3', title: 'Heading 3', class: 'ck-heading_heading3' }

        alignment:
            options:
                - { name: 'left', className: 'text-left' }
                - { name: 'center', className: 'text-center' }
                - { name: 'right', className: 'text-right' }
                - { name: 'justify', className: 'text-justify' }

        importModules:
            - { module: '@ckeditor/ckeditor5-code-block', exports: ['CodeBlock'] }

        table:
            contentToolbar:
                - tableRow
                - tableColumn
                - mergeTableCells
