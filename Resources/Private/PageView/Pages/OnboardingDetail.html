<f:layout name="Default" />
<f:section name="Main">
<div class="mt-5 space-y-3 md:grid md:grid-cols-6 md:gap-x-12 lg:mt-20 lg:space-y-5">
    <div class="col-span-4 xl:space-y-3">
        <f:render partial="Content" arguments="{records: content.top.records}"/>
    </div>
    <div class="col-span-4">
        <f:render partial="Content" arguments="{records: content.main.records}"/>
    </div>
    <aside class="col-span-2 space-y-5 lg:space-y-20">
        <f:render partial="Content" arguments="{records: content.aside.records}"/>
    </aside>
</div>
<f:render partial="Content" arguments="{records: content.bottom.records}"/>
</f:section>
