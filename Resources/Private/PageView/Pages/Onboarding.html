<f:layout name="Default" />
<f:section name="Main">

    <f:asset.script identifier="carousel-stones" src="EXT:indiz-digital-gmbh/stepping-stone-site-package/Resources/Public/JavaScript/ndz-carousel-stones.js"/>
    <f:asset.css identifier="flickity-css" src="EXT:indiz-digital-gmbh/stepping-stone-site-package/Resources/Public/Css/flickity.css" />
    <f:asset.script identifier="flickity-js" src="EXT:indiz-digital-gmbh/stepping-stone-site-package/Resources/Public/JavaScript/flickity.pkgd.js" />

    <div class="grid grid-cols-3 gap-5 space-y-5 xl:space-y-10">
        <div class="col-span-3 mt-5 md:col-span-2 xl:mt-20">
            <f:render partial="Content" arguments="{records: content.top.records}"/>
        </div>
        <div class="col-span-3 space-y-10">
            <f:render partial="Content" arguments="{records: content.main.records}"/>
        </div>
    </div>
</f:section>
